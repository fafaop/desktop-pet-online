<!doctype html>
<html>
<body style="background:transparent;text-align:center;font-family:Arial;color:white;">
  <div style="font-size:90px" id="pet">🐱</div>
  <h3 id="name">Mimi</h3>
  <div id="status"></div>

  <div>
    <button onclick="feed()">🍖 Feed</button>
    <button onclick="play()">🎮 Play</button>
  </div>

  <hr>
  <div>
    <input id="nickname" placeholder="nickname">
    <button onclick="login()">Login</button>
  </div>
  <div id="room-current">Room: lobby</div>
  <div>
    <input id="roomId" placeholder="room id">
    <button onclick="joinRoom()">Join</button>
    <button onclick="createRoom()">Create</button>
  </div>
  <div id="rooms" style="margin-top:8px"></div>
  <div id="room-users" style="margin-top:8px"></div>
  <hr>
  <div id="online">Online: 0</div>
  <input id="msg" placeholder="message">
  <button onclick="chat()">Send</button>
  <div id="chat" style="height:100px;overflow:auto"></div>

<script>
const { ipcRenderer } = require('electron');
let currentRoomId = 'lobby';

async function refresh() {
  const state = await ipcRenderer.invoke('pet:getState');
  document.getElementById('name').innerText = state.name + ' Lv.' + state.level;
  document.getElementById('status').innerText =
    'Mood: ' + state.mood + ' Hunger: ' + state.hunger;
}

function login() {
  ipcRenderer.send('user:login', document.getElementById('nickname').value);
}

async function feed() {
  await ipcRenderer.invoke('pet:feed');
  refresh();
}

async function play() {
  await ipcRenderer.invoke('pet:play');
  refresh();
}

function joinRoom() {
  ipcRenderer.send('room:join', document.getElementById('roomId').value);
}

function createRoom() {
  ipcRenderer.send('room:create', document.getElementById('roomId').value);
}

function chat() {
  const input = document.getElementById('msg');
  ipcRenderer.send('chat:send', input.value);
  input.value = '';
}

ipcRenderer.on('online:update', (_, data) => {
  document.getElementById('online').innerText =
    'Online: ' + data.users.length;
});

ipcRenderer.on('room:joined', (_, data) => {
  currentRoomId = data.roomId || currentRoomId;
  document.getElementById('room-current').innerText = 'Room: ' + currentRoomId;
});

ipcRenderer.on('room:list', (_, data) => {
  const rooms = data.rooms || [];
  document.getElementById('rooms').innerHTML = rooms.length
    ? rooms.map(room => '<div>' + room.name + ' (' + room.count + ')</div>').join('')
    : '<div>No rooms yet</div>';
});

ipcRenderer.on('room:users', (_, data) => {
  const users = data.users || [];
  document.getElementById('room-users').innerText =
    'Users: ' + (users.map(user => user.name).join(', ') || 'none');
});

ipcRenderer.on('chat:message', (_, data) => {
  if ((data.roomId || currentRoomId) !== currentRoomId) {
    return;
  }

  document.getElementById('chat').innerHTML +=
    '<div>[' + currentRoomId + '] ' + data.username + ': ' + data.message + '</div>';
});

refresh();
</script>
</body>
</html>
