<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; img-src 'self' data:">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Desktop Pet Online</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="titlebar">
      <span>Desktop Pet Online</span>
      <div class="window-actions">
        <button id="minimize" aria-label="Minimize">−</button>
        <button id="close" aria-label="Close">×</button>
      </div>
    </header>

    <section class="hero">
      <div id="connection" class="connection offline">Offline</div>
      <div class="pet-preview" aria-label="beige bear pet">
        <span class="preview-ear left"></span><span class="preview-ear right"></span>
        <span class="preview-face"><i class="preview-eye left"></i><i class="preview-eye right"></i><i class="preview-nose"></i></span>
        <span class="preview-body"></span>
      </div>
      <h1 id="pet-name">Mimi</h1>
      <p id="pet-status">Mood 80 · Hunger 20</p>
      <div class="button-row">
        <button id="feed" class="primary">🍖 Feed</button>
        <button id="play" class="primary">🎮 Play</button>
        <button id="toggle-movement">Pause roaming</button>
      </div>
    </section>

    <section class="panel">
      <h2>Profile</h2>
      <div class="input-row">
        <input id="nickname" maxlength="24" placeholder="Nickname" autocomplete="off">
        <button id="login">Login</button>
      </div>
    </section>

    <details class="panel settings-panel">
      <summary>Connection settings</summary>
      <label for="server-url">WebSocket server</label>
      <input id="server-url" maxlength="2048" placeholder="wss://pet.example.com/ws" spellcheck="false">
      <p class="hint">Use WSS for public servers. Saving reconnects immediately.</p>
      <button id="save-settings">Save and reconnect</button>
    </details>

    <section class="panel">
      <div class="section-heading">
        <h2 id="room-current">Room · lobby</h2>
        <span id="online">0 online</span>
      </div>
      <div class="input-row">
        <input id="room-id" maxlength="32" placeholder="Room ID" autocomplete="off">
        <button id="join-room">Join</button>
        <button id="create-room">Create</button>
      </div>
      <div class="subsection">
        <strong>Rooms</strong>
        <div id="rooms" class="chips"><span class="muted">No rooms yet</span></div>
      </div>
      <div class="subsection">
        <strong>Members</strong>
        <div id="room-users" class="muted">None</div>
      </div>
      <div class="subsection">
        <strong>Other pets</strong>
        <div id="remote-pets" class="muted">None</div>
      </div>
    </section>

    <section class="panel chat-panel">
      <h2>Room chat</h2>
      <div id="chat" class="chat-log" aria-live="polite"></div>
      <div class="input-row">
        <input id="message" maxlength="500" placeholder="Write a message" autocomplete="off">
        <button id="send-chat" class="primary">Send</button>
      </div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>
  <script src="renderer.js"></script>
</body>
</html>
